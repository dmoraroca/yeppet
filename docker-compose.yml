services:
  db:
    image: postgres:17
    container_name: zuppeto-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zuppeto}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - zuppeto_pg_data:/var/lib/postgresql/data
      - ./sql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-zuppeto}"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:4-management
    container_name: zuppeto-rabbitmq
    restart: unless-stopped
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    volumes:
      - zuppeto_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile.dev
    image: zuppeto-api-dev
    container_name: zuppeto-api
    working_dir: /app
    volumes:
      - ./:/app:cached
    entrypoint: ["/bin/bash", "-lc"]
    command:
      [
        "until pg_isready -h db -p 5432 -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-zuppeto}; do sleep 2; done && find src/Backend -type d \\( -name bin -o -name obj -o -name bin-local -o -name obj-local \\) -prune -exec rm -rf {} + && dotnet restore Zuppeto.sln --ignore-failed-sources && dotnet build src/Backend/Api/Api.csproj -c Debug --no-restore && dotnet-ef database update --project src/Backend/Infrastructure/Infrastructure.csproj --startup-project src/Backend/Api/Api.csproj --no-build && cd src/Backend/Api && exec dotnet bin-local/Debug/net10.0/Api.dll --urls http://0.0.0.0:${API_PORT:-5211}"
      ]
    ports:
      - "${API_PORT:-5211}:${API_PORT:-5211}"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ZUPPETO_FILE_LOGS: "true"
      ConnectionStrings__Zuppeto: Host=db;Port=5432;Database=${POSTGRES_DB:-zuppeto};Username=${POSTGRES_USER:-app};Password=${POSTGRES_PASSWORD:-app}
      RabbitMq__Enabled: "true"
      RabbitMq__HostName: rabbitmq
      RabbitMq__Port: "5672"
      RabbitMq__UserName: ${RABBITMQ_USER:-guest}
      RabbitMq__Password: ${RABBITMQ_PASSWORD:-guest}
      COMPlus_EnableDiagnostics: 1
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile.dev
    image: zuppeto-web-dev
    container_name: zuppeto-web
    working_dir: /app/src/Web
    volumes:
      - ./:/app:cached
      - zuppeto_web_node_modules:/app/src/Web/node_modules
    entrypoint: ["/bin/bash", "-lc"]
    command:
      [
        "if [ ! -d node_modules ] || [ -z \"$(ls -A node_modules 2>/dev/null)\" ]; then npm ci; fi && exec npm start -- --host 0.0.0.0 --port ${WEB_PORT:-4200}"
      ]
    ports:
      - "${WEB_PORT:-4200}:${WEB_PORT:-4200}"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      NG_CLI_ANALYTICS: "false"
    depends_on:
      api:
        condition: service_started

  e2e:
    image: mcr.microsoft.com/playwright:v1.53.0-jammy
    container_name: zuppeto-e2e
    working_dir: /app/e2e
    profiles: ["e2e"]
    volumes:
      - ./:/app:cached
      - zuppeto_e2e_node_modules:/app/e2e/node_modules
    entrypoint: ["/bin/bash", "-lc"]
    command:
      [
        "if [ ! -d node_modules ] || [ -z \"$(ls -A node_modules 2>/dev/null)\" ]; then npm ci; fi && npx playwright test"
      ]
    environment:
      E2E_BASE_URL: "http://zuppeto-web:4200"
      E2E_API_URL: "http://zuppeto-api:5211"
    depends_on:
      web:
        condition: service_started

volumes:
  zuppeto_rabbitmq_data:
  zuppeto_pg_data:
  zuppeto_web_node_modules:
  zuppeto_e2e_node_modules:
