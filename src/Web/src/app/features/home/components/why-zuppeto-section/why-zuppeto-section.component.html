<section class="why" id="why-zuppeto">
  <app-section-heading [eyebrow]="content().eyebrow" [title]="content().title" />
  <p class="why__copy">
    El valor de Zuppeto no és només mostrar llocs, sinó reduir la fricció real entre descobrir,
    validar i tornar després al que t’ha interessat.
  </p>

  <div class="why__grid">
    @for (reason of content().reasons; track reason) {
      <app-generic-info-card badge="SÍ" [body]="reason" />
    }
  </div>
</section>
