<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zuppeto | Pàgina Temporal</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4fbfa;
      --panel: #ffffff;
      --border: #d7e8e5;
      --text: #113a36;
      --muted: #5d7d79;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top left, rgba(67, 208, 194, 0.16), transparent 35%),
        radial-gradient(circle at bottom right, rgba(17, 122, 105, 0.12), transparent 32%),
        var(--bg);
      color: var(--text);
      font: 600 16px/1.4 "Segoe UI", Arial, sans-serif;
    }

    main {
      width: min(100%, 640px);
      padding: 40px 32px;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 24px 60px rgba(26, 72, 66, 0.12);
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.1;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-weight: 500;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <main>
    <h1>PÀGINA TEMPORAL</h1>
    <p>Data Deletion de Zuppeto pendent de publicació definitiva.</p>
  </main>
</body>
</html>
